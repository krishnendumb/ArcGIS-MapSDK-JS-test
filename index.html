<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcGIS App</title>
  </head>

  <body>
    <calcite-shell>
      <calcite-navigation slot="header">
        <calcite-navigation-logo slot="logo"></calcite-navigation-logo>
      </calcite-navigation>

      <!-- Search -->
      <arcgis-search slot="top-right"></arcgis-search>

      <!-- Map -->
      <arcgis-map id="map" item-id="21319ca3e49c47e982cd0b58060f4238">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
      </arcgis-map>

      <!-- Button -->
      <calcite-button id="bufferBtn" slot="panel-start">
        Create Buffer
      </calcite-button>

    </calcite-shell>

    <script type="module" src="/main.js"></script>
  </body>
</html>
